<!DOCTYPE html>
<html>
<head>
<title>Sub Element Selector Example</title>

<style>

/* Selects only direct <p> inside div */
div > p {
    color: blue;
    font-weight: bold;
}

</style>

</head>

<body>

<h2>Sub Element (Child) Selector Example</h2>

<div>
    <p>This paragraph is a direct child of div (Selected)</p>

    <section>
        <p>This paragraph is inside section (Not Selected)</p>
    </section>

</div>

<p>This paragraph is outside div (Not Selected)</p>

</body>
</html>
