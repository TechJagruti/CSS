<!DOCTYPE html>
<html>
<head>
<title>Group Selector Example</title>

<style>

/* Group selector applying same style to h1, h2 and p */

h1, h2, p {
    color: blue;
    font-family: Arial;
}

</style>

</head>

<body>

<h1>This is Heading 1</h1>
<h2>This is Heading 2</h2>
<p>This is a paragraph</p>

</body>
</html>
